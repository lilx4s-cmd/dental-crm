services:
  - type: web
    name: dental-crm-api
    runtime: node
    plan: free
    buildCommand: "npm install && cd apps/api && ../../node_modules/.bin/prisma generate && ../../node_modules/.bin/nest build"
    startCommand: "cd apps/api && npx prisma migrate deploy && node dist/main.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: "https://dental-crm-web.vercel.app,https://dental-crm-web-psi.vercel.app"
      - key: PORT
        value: 10000
